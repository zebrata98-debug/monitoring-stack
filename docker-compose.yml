version: "3.8"

networks:
  monitoring:
    driver: bridge          # All three containers talk to each other on this network

volumes:
  prometheus_data: {}       # Persists metric data across container restarts
  grafana_data: {}          # Persists dashboards and Grafana settings

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus:/etc/prometheus          # Mounts your config files into the container
      - prometheus_data:/prometheus           # Persists time-series data
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"   # Keep 15 days of metrics
      - "--web.enable-lifecycle"              # Allows config reload without restart
    ports:
      - "9090:9090"                           # Prometheus UI accessible at localhost:9090
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro                   # Read-only access to kernel proc data
      - /sys:/host/sys:ro                     # System hardware info
      - /:/rootfs:ro                          # Filesystem metrics
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123   # Change this before pushing to GitHub
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"                           # Grafana UI accessible at localhost:3000
    networks:
      - monitoring
