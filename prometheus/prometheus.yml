global:
  scrape_interval: 15s        # How often Prometheus collects metrics
  evaluation_interval: 15s    # How often it evaluates alert rules

alerting:
  alertmanagers:
    - static_configs:
        - targets: []         # No Alertmanager for now — alerts stay in Prometheus UI

rule_files:
  - "alert.rules.yml"         # Load our alert rules file

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]   # Prometheus scrapes itself

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]  # Docker service name resolves automatically
